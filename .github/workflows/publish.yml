name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.3.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Verify compiled extensions exist
        run: |
          if ! ls src/scansci_pdf/_core/*.pyd 2>/dev/null && ! ls src/scansci_pdf/_core/*.so 2>/dev/null; then
            echo "WARNING: No compiled extensions found. Package will use pure Python fallbacks."
          fi

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
